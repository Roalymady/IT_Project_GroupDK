{% extends "base.html" %}

{% block title %}Create Group Buy | UniGroupBuy{% endblock %}

{% block content %}
<section class="mb-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
        <div>
            <h1 class="page-header-title mb-1">Create a new group buy</h1>
            <p class="page-header-subtitle mb-0">
                Set up the details so your classmates can join and save together.
            </p>
        </div>
    </div>
</section>

<section aria-label="Create a new group buy form">
    <div class="card">
        <div class="card-body">
            <form method="post" class="row g-3" novalidate>
                {% csrf_token %}
                
                <div class="col-12">
                    <label for="id_title" class="form-label">Group buy title</label>
                    <input
                        type="text"
                        class="form-control"
                        id="id_title"
                        name="title"
                        required
                        placeholder="Bubble Tea Happy Hour"
                    >
                </div>

                <div class="col-12 col-md-6">
                    <label for="id_price" class="form-label">Price (£)</label>
                    <input
                        type="number"
                        step="0.01"
                        class="form-control"
                        id="id_price"
                        name="price"
                        required
                        placeholder="e.g. 5.50"
                    >
                </div>

                <div class="col-12 col-md-6">
                    <label for="id_target_quantity" class="form-label">Target Quantity</label>
                    <input
                        type="number"
                        class="form-control"
                        id="id_target_quantity"
                        name="target_quantity"
                        required
                        placeholder="e.g. 10"
                    >
                    <div class="form-text">
                        How many orders needed to get the discount?
                    </div>
                </div>

                <div class="col-12">
                    <label for="id_description" class="form-label">Description & Pickup instructions</label>
                    <textarea
                        class="form-control"
                        id="id_description"
                        name="description"
                        rows="3"
                        required
                        placeholder="Example: From Byres Road Tea House. Meet at the University of Glasgow library entrance at 6:30 PM."
                    ></textarea>
                </div>

                <div class="col-12 d-flex justify-content-end pt-2">
                    <button
                        type="submit"
                        class="btn btn-primary btn-press"
                        aria-label="Create Group Buy"
                    >
                        Create Group Buy
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
