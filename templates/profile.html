{% extends "base.html" %} {% block title %}Profile | UniGroupBuy{% endblock %}
{% block content %}
<section class="mb-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
        <div>
            <h1 class="page-header-title mb-1">Profile</h1>
            <p class="page-header-subtitle mb-0">
                Update your account information and see your activity summary.
            </p>
        </div>
    </div>
</section>

<section aria-label="Profile information">
    <div class="card">
        <div class="card-body">
            <div class="row g-4">
                <div class="col-12 col-md-4">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 56px; height: 56px; font-weight: 600; font-size: 1.25rem;">
                            {{ request.user.username|make_list|first|upper }}
                        </div>
                        <div>
                            <div class="fw-semibold">{{ request.user.username }}</div>
                            <div class="small text-muted">Campus Student</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
